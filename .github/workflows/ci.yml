name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Check syntax
        run: python -m py_compile pynormanshutters.py

      - name: Lint
        run: flake8 pynormanshutters.py tests/

      - name: Test
        run: pytest
